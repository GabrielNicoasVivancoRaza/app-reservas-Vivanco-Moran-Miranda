name: DAST Security Scan (OWASP ZAP)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  dast-scan:
    name: Dynamic Application Security Testing
    runs-on: self-hosted   # Windows runner con Docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # 0. Generar frontend/.env.production.local
      # (está en .gitignore, no existe en el checkout del runner;
      # son variables NEXT_PUBLIC_*, no contienen secretos)
      # ============================================================
      - name: Create frontend env file
        shell: powershell
        run: |
          @"
          NEXT_PUBLIC_API_URL=/api/auth
          NEXT_PUBLIC_BOOKING_URL=/api/bookings
          NEXT_PUBLIC_USER_URL=/api/users
          "@ | Out-File -FilePath "frontend/.env.production.local" -Encoding ascii

      # ============================================================
      # 1. Levantar la aplicación con el compose dedicado de DAST
      # (proyecto "dast": contenedores y red aislados, sin puertos
      # publicados, para no chocar con el stack local del runner)
      # ============================================================
      - name: Start application with docker-compose
        shell: powershell
        run: |
          docker-compose -f docker-compose.dast.yml -p dast up -d --build

      # ============================================================
      # 2. Esperar a que el frontend esté listo (desde la red interna)
      # ============================================================
      - name: Wait for application to be ready
        shell: powershell
        run: |
          $maxAttempts = 30
          $attempt = 0
          $ready = $false
          Write-Host "Esperando que el frontend responda en la red dast_default..."
          do {
            $attempt++
            docker run --rm --network dast_default curlimages/curl:latest -sf -o /dev/null http://frontend:3000
            if ($LASTEXITCODE -eq 0) {
              $ready = $true
              break
            }
            Write-Host "Frontend aun no responde (intento $attempt de $maxAttempts)"
            Start-Sleep -Seconds 5
          } while ($attempt -lt $maxAttempts)
          if (-not $ready) {
            docker-compose -f docker-compose.dast.yml -p dast ps
            docker-compose -f docker-compose.dast.yml -p dast logs frontend
            Write-Error "El frontend no respondio despues de $maxAttempts intentos."
            exit 1
          }
          Write-Host "Frontend listo."

      # ============================================================
      # 3. Ejecutar OWASP ZAP Baseline Scan contra frontend
      # (-I: el paso no falla por warnings; el paso 6/7 decide segun
      # el riesgo de las alertas del reporte)
      # ============================================================
      - name: Run OWASP ZAP Baseline Scan
        shell: powershell
        run: |
          $targetUrl = "http://frontend:3000"
          Write-Host "Escaneando $targetUrl en la red dast_default ..."
          New-Item -ItemType Directory -Force -Path "zap_reports" | Out-Null
          docker run --rm `
            --network dast_default `
            -v "${PWD}/zap_reports:/zap/wrk" `
            ghcr.io/zaproxy/zaproxy:stable `
            zap-baseline.py `
            -t $targetUrl `
            -r report.html `
            -x report.xml `
            -J report.json `
            -I

      # ============================================================
      # 5. Subir los reportes como artifacts
      # ============================================================
      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap_reports/

      # ============================================================
      # 6. Verificar vulnerabilidades y generar resumen para Telegram
      # ============================================================
      - name: Analyze ZAP results and generate summary
        shell: powershell
        id: summary
        run: |
          $reportXml = "zap_reports/report.xml"
          $summary = @{
            Total    = 0
            High     = 0
            Medium   = 0
            Low      = 0
            Info     = 0
            Fail     = $false
          }
          if (Test-Path $reportXml) {
            [xml]$xml = Get-Content $reportXml
            $alerts = $xml.SelectNodes("//alertitem")
            foreach ($alert in $alerts) {
              $risk = [int]$alert.riskcode
              $summary.Total++
              switch ($risk) {
                3 { $summary.High++ }
                2 { $summary.Medium++ }
                1 { $summary.Low++ }
                0 { $summary.Info++ }
              }
            }
            if ($summary.High -gt 0) {
              $summary.Fail = $true
            }
          } else {
            Write-Host "No se encontró reporte XML. Asumiendo sin vulnerabilidades."
          }
          # Guardar resumen en archivo para que el notificador pueda leerlo
          $summaryJson = $summary | ConvertTo-Json -Compress
          $summaryJson | Out-File -FilePath "dast_summary.json" -Encoding utf8
          Write-Host "Resumen: $summaryJson"
          # Exportar variables para pasos posteriores
          echo "total=$($summary.Total)" >> $env:GITHUB_OUTPUT
          echo "high=$($summary.High)" >> $env:GITHUB_OUTPUT
          echo "medium=$($summary.Medium)" >> $env:GITHUB_OUTPUT
          echo "low=$($summary.Low)" >> $env:GITHUB_OUTPUT
          echo "info=$($summary.Info)" >> $env:GITHUB_OUTPUT
          echo "fail=$($summary.Fail)" >> $env:GITHUB_OUTPUT

      # ============================================================
      # 7. Fallar el pipeline si hay vulnerabilidades ALTAS
      # ============================================================
      - name: Fail if high-risk vulnerabilities found
        if: steps.summary.outputs.fail == 'true'
        shell: powershell
        run: |
          Write-Host "Se encontraron ${{ steps.summary.outputs.high }} vulnerabilidades de ALTO riesgo. Fallando el pipeline."
          exit 1

      # ============================================================
      # 8. Detener y limpiar el stack de DAST (solo el proyecto "dast",
      # no toca el SonarQube ni el mongo locales)
      # ============================================================
      - name: Stop services
        if: always()
        shell: powershell
        run: docker-compose -f docker-compose.dast.yml -p dast down -v
        
