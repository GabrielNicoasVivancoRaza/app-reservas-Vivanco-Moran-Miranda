name: DAST Security Scan (OWASP ZAP)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  dast-scan:
    name: Dynamic Application Security Testing
    runs-on: self-hosted   # Windows runner con Docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # 1. Levantar la aplicación con docker-compose
      # ============================================================
      - name: Start application with docker-compose
        shell: powershell
        run: |
          docker-compose -f docker-compose.yml up -d

      # ============================================================
      # 2. Esperar a que frontend y servicios críticos estén listos
      # ============================================================
      - name: Wait for application to be ready
        shell: powershell
        run: |
          $services = @(
            @{Name="frontend"; Port=3000},
            @{Name="auth-service"; Port=4000},
            @{Name="booking-service"; Port=5000}
          )
          $maxAttempts = 30
          $attempt = 0
          $allReady = $false
          Write-Host "Esperando que los servicios estén disponibles en localhost..."
          do {
            $attempt++
            $ready = $true
            foreach ($svc in $services) {
              $url = "http://localhost:$($svc.Port)"
              try {
                $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 2
                if ($response.StatusCode -ne 200) {
                  Write-Host "Servicio $($svc.Name) en $url devolvió $($response.StatusCode)"
                  $ready = $false
                } else {
                  Write-Host "Servicio $($svc.Name) listo"
                }
              } catch {
                Write-Host "Servicio $($svc.Name) en $url no responde (intento $attempt)"
                $ready = $false
              }
            }
            if ($ready) {
              $allReady = $true
              break
            }
            Start-Sleep -Seconds 5
          } while ($attempt -lt $maxAttempts)
          if (-not $allReady) {
            Write-Error "Algunos servicios no están listos después de $maxAttempts intentos."
            exit 1
          }
          Write-Host "Todos los servicios están listos."

      # ============================================================
      # 3. Obtener el nombre de la red de docker-compose
      # ============================================================
      - name: Get docker-compose network name
        shell: powershell
        id: network
        run: |
          $containerName = "frontend"
          $network = docker inspect -f '{{range $net,$v := .NetworkSettings.Networks}}{{$net}}{{end}}' $containerName
          if (-not $network) {
            Write-Host "No se pudo obtener la red del contenedor. Usando red por defecto 'reservasec_default'."
            $network = "reservasec_default"
          }
          Write-Host "Red detectada: $network"
          echo "network=$network" >> $env:GITHUB_OUTPUT

      # ============================================================
      # 4. Ejecutar OWASP ZAP Baseline Scan contra frontend
      # ============================================================
      - name: Run OWASP ZAP Baseline Scan
        shell: powershell
        env:
          NETWORK: ${{ steps.network.outputs.network }}
        run: |
          $targetUrl = "http://frontend:3000"
          Write-Host "Escaneando $targetUrl en la red $env:NETWORK ..."
          New-Item -ItemType Directory -Force -Path "zap_reports" | Out-Null
          docker run --rm `
            --network $env:NETWORK `
            -v "${PWD}/zap_reports:/zap/wrk" `
            owasp/zap2docker-stable `
            zap-baseline.py `
            -t $targetUrl `
            -r report.html `
            -x report.xml `
            -z "-config view.mode=table" `
            -J report.json

      # ============================================================
      # 5. Subir los reportes como artifacts
      # ============================================================
      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap_reports/

      # ============================================================
      # 6. Verificar vulnerabilidades y generar resumen para Telegram
      # ============================================================
      - name: Analyze ZAP results and generate summary
        shell: powershell
        id: summary
        run: |
          $reportXml = "zap_reports/report.xml"
          $summary = @{
            Total    = 0
            High     = 0
            Medium   = 0
            Low      = 0
            Info     = 0
            Fail     = $false
          }
          if (Test-Path $reportXml) {
            [xml]$xml = Get-Content $reportXml
            $alerts = $xml.SelectNodes("//alertitem")
            foreach ($alert in $alerts) {
              $risk = [int]$alert.riskcode
              $summary.Total++
              switch ($risk) {
                3 { $summary.High++ }
                2 { $summary.Medium++ }
                1 { $summary.Low++ }
                0 { $summary.Info++ }
              }
            }
            if ($summary.High -gt 0) {
              $summary.Fail = $true
            }
          } else {
            Write-Host "No se encontró reporte XML. Asumiendo sin vulnerabilidades."
          }
          # Guardar resumen en archivo para que el notificador pueda leerlo
          $summaryJson = $summary | ConvertTo-Json -Compress
          $summaryJson | Out-File -FilePath "dast_summary.json" -Encoding utf8
          Write-Host "Resumen: $summaryJson"
          # Exportar variables para pasos posteriores
          echo "total=$($summary.Total)" >> $env:GITHUB_OUTPUT
          echo "high=$($summary.High)" >> $env:GITHUB_OUTPUT
          echo "medium=$($summary.Medium)" >> $env:GITHUB_OUTPUT
          echo "low=$($summary.Low)" >> $env:GITHUB_OUTPUT
          echo "info=$($summary.Info)" >> $env:GITHUB_OUTPUT
          echo "fail=$($summary.Fail)" >> $env:GITHUB_OUTPUT

      # ============================================================
      # 7. Fallar el pipeline si hay vulnerabilidades ALTAS
      # ============================================================
      - name: Fail if high-risk vulnerabilities found
        if: steps.summary.outputs.fail == 'true'
        shell: powershell
        run: |
          Write-Host "Se encontraron ${{ steps.summary.outputs.high }} vulnerabilidades de ALTO riesgo. Fallando el pipeline."
          exit 1

      # ============================================================
      # 8. Detener servicios
      # ============================================================
      - name: Stop services
        if: always()
        shell: powershell
        run: docker-compose down