name: Telegram Notify

on:
  workflow_run:
    workflows: ["SonarQube Analysis"]
    types: [completed]

jobs:
  notify:
    name: Notify Telegram with SonarQube results
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build and send report
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: reservasec
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.workflow_run.head_commit.author.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          $ErrorActionPreference = "Stop"
          $repo = $env:GITHUB_REPOSITORY
          $sha = $env:HEAD_SHA
          $hostUrl = $env:SONAR_HOST_URL.TrimEnd('/')
          $projectKey = $env:SONAR_PROJECT_KEY
          $commitUrl = "$($env:GITHUB_SERVER_URL)/$repo/commit/$sha"
          $dashboardUrl = "$hostUrl/dashboard?id=$projectKey"

          function Send-Telegram($text) {
            $telegramUri = "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage"
            $bodyObj = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $text }
            $json = $bodyObj | ConvertTo-Json -Compress
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($json)
            Invoke-RestMethod -Uri $telegramUri -Method Post -Body $bytes -ContentType "application/json; charset=utf-8" | Out-Null
          }

          $stage = "inicio"

          try {
            $stage = "GitHub API (commits)"
            $ghHeaders = @{
              Authorization = "Bearer $($env:GH_TOKEN)"
              Accept        = "application/vnd.github+json"
            }
            $commitData = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/commits/$sha" -Headers $ghHeaders

            $fileEntries = $commitData.files | Select-Object -First 10 | ForEach-Object { "  - $($_.filename)" }
            $filesText = ($fileEntries -join "`n")
            if ($commitData.files.Count -gt 10) {
              $filesText += "`n  ... y $($commitData.files.Count - 10) archivo(s) mas"
            }
            if (-not $filesText) { $filesText = "  (sin archivos reportados)" }

            $pair = "$($env:SONAR_TOKEN):"
            $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
            $sonarHeaders = @{ Authorization = "Basic $b64" }

            $stage = "SonarQube API (qualitygates/project_status)"
            $gate = Invoke-RestMethod -Uri "$hostUrl/api/qualitygates/project_status?projectKey=$projectKey" -Headers $sonarHeaders

            $m = @{}
            try {
              $metricKeys = "bugs,vulnerabilities,code_smells,ncloc,duplicated_lines_density,reliability_rating,security_rating,sqale_rating"
              $measures = Invoke-RestMethod -Uri "$hostUrl/api/measures/component?component=$projectKey&metricKeys=$metricKeys" -Headers $sonarHeaders
              foreach ($meas in $measures.component.measures) { $m[$meas.metric] = $meas.value }
            } catch {
              Write-Host "No se pudieron obtener las metricas generales: $($_.Exception.Message)"
            }

            function Get-Value($key) {
              if ($m.ContainsKey($key)) { return $m[$key] }
              return "N/A"
            }

            function Get-Rating($key) {
              if (-not $m.ContainsKey($key)) { return "N/A" }
              switch ($m[$key]) {
                "1.0" { return "A" }
                "2.0" { return "B" }
                "3.0" { return "C" }
                "4.0" { return "D" }
                "5.0" { return "E" }
                default { return "N/A" }
              }
            }

            $depCritical = 0
            $depHigh = 0
            $depMedium = 0
            $depLow = 0
            $depTotal = 0
            try {
              $auditDirs = @("auth-service", "booking-service", "user-service", "notification-service", "frontend")
              foreach ($dir in $auditDirs) {
                if (Test-Path (Join-Path $dir "package-lock.json")) {
                  Push-Location $dir
                  try {
                    $auditRaw = npm audit --json 2>$null | Out-String
                    $audit = $auditRaw | ConvertFrom-Json
                    $v = $audit.metadata.vulnerabilities
                    if ($v) {
                      $depCritical += [int]$v.critical
                      $depHigh     += [int]$v.high
                      $depMedium   += [int]$v.moderate
                      $depLow      += [int]$v.low
                      $depTotal    += [int]$v.total
                    }
                  } catch {
                    Write-Host "npm audit fallo en $dir : $($_.Exception.Message)"
                  } finally {
                    Pop-Location
                  }
                }
              }
            } catch {
              Write-Host "No se pudo completar npm audit: $($_.Exception.Message)"
            }

            $metricNames = @{
              blocker_violations         = "Blocker Issues (> 0)"
              critical_violations        = "Critical Issues (> 0)"
              major_violations           = "Major Issues (> 5)"
              security_hotspots_reviewed = "Security Hotspots Reviewed (< 100%)"
              coverage                   = "Coverage (< 80%)"
              line_coverage               = "Coverage (< 80%)"
              duplicated_lines_density   = "Duplicated Lines % (> 3%)"
              sqale_debt_ratio           = "Technical Debt Ratio (> 2.5%)"
              complexity                 = "Cyclomatic Complexity (> 50)"
              cognitive_complexity       = "Cognitive Complexity (> 30)"
            }

            $condLines = foreach ($c in $gate.projectStatus.conditions) {
              $label = $metricNames[$c.metricKey]
              if (-not $label) { $label = $c.metricKey }
              $mark = if ($c.status -eq "OK") { "✅" } else { "❌" }
              "  $mark $label -> actual: $($c.actualValue)"
            }
            $condText = ($condLines -join "`n")
            if (-not $condText) { $condText = "  (StrictGate no devolvio condiciones; verifica que sea el Quality Gate por defecto del proyecto)" }

            $gateStatus = $gate.projectStatus.status
            $gateLabel = if ($gateStatus -eq "OK") { "✅ PASSED" } else { "❌ FAILED" }

            $message = @"
          🔔 Alertas SAST - ReservasEC ($($env:HEAD_BRANCH))

          📝 Commit: $($env:COMMIT_MESSAGE)
          👤 Autor: $($env:COMMIT_AUTHOR)

          📊 Metricas Generales:
            🐞 Bugs: $(Get-Value 'bugs')
            🔓 Vulnerabilidades: $(Get-Value 'vulnerabilities')
            👃 Code Smells: $(Get-Value 'code_smells')
            📄 Lineas de codigo: $(Get-Value 'ncloc')
            🔁 Duplicacion: $(Get-Value 'duplicated_lines_density')%

          🏅 Ratings de Calidad:
            🔐 Seguridad: $(Get-Rating 'security_rating')
            🛡️ Fiabilidad: $(Get-Rating 'reliability_rating')
            🔧 Mantenibilidad: $(Get-Rating 'sqale_rating')

          📦 Vulnerabilidades en dependencias (npm audit):
            🔴 CRITICAL: $depCritical
            🟠 HIGH: $depHigh
            🟡 MEDIUM: $depMedium
            🔵 LOW: $depLow
            ⚪ TOTAL: $depTotal

          🚦 Quality Gate StrictGate: $gateLabel
          $condText

          📁 Archivos modificados:
          $filesText

          🔗 Ver en SonarQube: $dashboardUrl
          🔗 Ver commit en GitHub: $commitUrl
          "@

            $stage = "envio a Telegram"
            Send-Telegram $message

            if ($gateStatus -ne "OK") {
              Write-Host "Quality Gate FAILED, ya notificado a Telegram."
              exit 1
            }
          }
          catch {
            $statusCode = $null
            if ($_.Exception.Response) { $statusCode = [int]$_.Exception.Response.StatusCode }
            $detail = "Paso: $stage`nError: $($_.Exception.Message)"
            if ($statusCode) { $detail += "`nHTTP status: $statusCode" }
            Send-Telegram "No se pudo generar el reporte de SonarQube para el commit $sha en rama $($env:HEAD_BRANCH).`n$detail`nRevisa el run: $($env:RUN_URL)"
            throw
          }
